default: &default
  dispatchers:
    - polling_interval: 1
      batch_size: 500
  workers:
    - queues: [conversion]
      threads: 2
      processes: 1
      polling_interval: 0.5
    - queues: [imports]
      threads: 2
      processes: 1
      polling_interval: 0.5
    - queues: [default, solid_queue_recurring]
      threads: 3
      processes: 1
      polling_interval: 0.1

development:
  <<: *default

test:
  <<: *default

production:
  <<: *default
