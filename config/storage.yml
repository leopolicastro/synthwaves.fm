test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

# mirror:
#   service: Mirror
#   primary: local
#   mirrors: [ amazon, google, microsoft ]

# Generic S3-compatible storage for self-hosting (set STORAGE_SERVICE=s3)
s3:
  service: S3
  access_key_id: <%= ENV["S3_ACCESS_KEY_ID"] %>
  secret_access_key: <%= ENV["S3_SECRET_ACCESS_KEY"] %>
  region: <%= ENV.fetch("S3_REGION", "us-east-1") %>
  bucket: <%= ENV["S3_BUCKET"] %>
  endpoint: <%= ENV["S3_ENDPOINT"] %>

# Linode Object Storage (S3-compatible) for production
# Configure credentials via: bin/rails credentials:edit
linode:
  service: S3
  access_key_id: <%= Rails.application.credentials.dig(:linode, :access_key_id) %>
  secret_access_key: <%= Rails.application.credentials.dig(:linode, :secret_access_key) %>
  region: <%= Rails.application.credentials.dig(:linode, :region) %>
  bucket: <%= Rails.application.credentials.dig(:linode, :bucket) %>
  endpoint: <%= Rails.application.credentials.dig(:linode, :endpoint) %>
